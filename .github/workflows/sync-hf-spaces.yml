name: Deploy Backend to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.23.0"

      - name: Prepare deploy tree
        run: |
          rsync -a --exclude='.git' --exclude='.env' . /tmp/space/

          # Swap in the Spaces Dockerfile (port 7860)
          cp /tmp/space/Dockerfile.spaces /tmp/space/Dockerfile

          # Write the HF Space README — must start at column 0, no leading spaces
          cat > /tmp/space/README.md << 'HFEOF'
---
title: Enterprise RAG Backend
emoji: 🤖
colorFrom: blue
colorTo: purple
sdk: docker
app_port: 7860
pinned: false
---
HFEOF

          echo "=== Files in deploy tree ==="
          ls /tmp/space/

      - name: Upload to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
import os
from huggingface_hub import HfApi

token = os.environ["HF_TOKEN"]
api   = HfApi(token=token)

print("Uploading to HF Space...")
api.upload_folder(
    folder_path="/tmp/space",
    repo_id="Srinath-54/rag-backend",
    repo_type="space",
    commit_message="deploy from GitHub Actions",
    ignore_patterns=["*.pyc", "__pycache__/", ".env", "*.db", "vector_store/", "data/"],
)
print("Upload complete — Space will rebuild automatically.")
PYEOF