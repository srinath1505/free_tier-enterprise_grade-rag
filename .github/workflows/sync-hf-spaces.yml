name: Deploy Backend to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Clone HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone "https://Srinath-54:${HF_TOKEN}@huggingface.co/spaces/Srinath-54/rag-backend" /tmp/hf-space
          echo "=== Current HF Space files ==="
          ls /tmp/hf-space/

      - name: Sync files into HF Space
        run: |
          # Remove everything except .git
          find /tmp/hf-space -mindepth 1 -not -path '/tmp/hf-space/.git*' -delete

          # Copy our files in
          rsync -a \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='*.db' \
            --exclude='vector_store/' \
            --exclude='data/' \
            . /tmp/hf-space/

          # Swap in the Spaces Dockerfile (port 7860)
          cp /tmp/hf-space/Dockerfile.spaces /tmp/hf-space/Dockerfile

          # Write the HF Space README with required card metadata
          cat > /tmp/hf-space/README.md << 'HFEOF'
---
title: Enterprise RAG Backend
emoji: 🤖
colorFrom: blue
colorTo: purple
sdk: docker
app_port: 7860
pinned: false
---
HFEOF

          echo "=== Files to deploy ==="
          ls /tmp/hf-space/

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/hf-space
          git add -A
          git status
          git diff --staged --stat
          git commit -m "deploy from GitHub Actions $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing new to commit"
          git push "https://Srinath-54:${HF_TOKEN}@huggingface.co/spaces/Srinath-54/rag-backend" main
          echo "Push complete — Space will rebuild automatically."
