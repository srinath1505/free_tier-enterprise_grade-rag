name: Deploy Backend to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy repo into a clean staging directory
          rsync -a --exclude='.git' --exclude='.env' . /tmp/space/
          cd /tmp/space

          # Swap in the Spaces-specific Dockerfile (port 7860)
          cp Dockerfile.spaces Dockerfile

          # HF Spaces needs a README.md with YAML frontmatter at the root.
          # IMPORTANT: heredoc content must start at column 0 — no leading
          # whitespace or the --- delimiters won't be parsed as frontmatter.
          cat > README.md << 'HFEOF'
---
title: Enterprise RAG Backend
emoji: 🤖
colorFrom: blue
colorTo: purple
sdk: docker
app_port: 7860
pinned: false
---
HFEOF

          # Force-push a clean history to the Space
          git init
          git config user.email "114842401+Srinath-54@users.noreply.github.com"
          git config user.name "Srinath-54"
          git add -A
          git commit -m "deploy $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push \
            https://Srinath-54:${HF_TOKEN}@huggingface.co/spaces/Srinath-54/rag-backend \
            HEAD:main --force
