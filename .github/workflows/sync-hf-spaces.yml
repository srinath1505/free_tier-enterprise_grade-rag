name: Deploy Backend to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          # ── Validate the token can reach the Space before doing any work ──
          echo "=== Checking Space accessibility ==="
          git ls-remote \
            https://Srinath-54:${HF_TOKEN}@huggingface.co/spaces/Srinath-54/rag-backend \
            || { echo "FATAL: Cannot reach Space. Check HF_TOKEN scope (needs write) and Space name."; exit 1; }

          echo "=== Preparing deploy tree ==="
          rsync -a --exclude='.git' --exclude='.env' . /tmp/space/
          cd /tmp/space

          cp Dockerfile.spaces Dockerfile

          cat > README.md << 'HFEOF'
---
title: Enterprise RAG Backend
emoji: 🤖
colorFrom: blue
colorTo: purple
sdk: docker
app_port: 7860
pinned: false
---
HFEOF

          echo "=== Pushing to HF Space ==="
          git init
          git config user.email "114842401+Srinath-54@users.noreply.github.com"
          git config user.name "Srinath-54"
          git add -A
          git commit -m "deploy $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          GIT_TRACE=1 git push \
            https://Srinath-54:${HF_TOKEN}@huggingface.co/spaces/Srinath-54/rag-backend \
            HEAD:main --force
          echo "=== Push complete ==="
