services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: rag-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false                  # prompted at deploy time — change from default
      - key: LLM_PROVIDER
        value: hf                    # Ollama cannot run on Render free tier; use HF Inference API
      - key: HF_TOKEN
        sync: false                  # prompted at deploy time — get one at huggingface.co/settings/tokens
      - key: RATE_LIMIT_AUTH_PER_MIN
        value: "20"
      - key: RATE_LIMIT_QUERY_PER_MIN
        value: "20"
      - key: RATE_LIMIT_UPLOAD_PER_MIN
        value: "10"

  # ── Frontend (Streamlit) ─────────────────────────────────────────────────────
  - type: web
    name: rag-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: rag-backend
          envVarKey: RENDER_EXTERNAL_URL   # auto-wired to backend's public URL