services:
  # ── Frontend (Streamlit) ─────────────────────────────────────────────────────
  # Backend runs on HF Spaces (free, 16 GB RAM — needed for the ML stack).
  # Deploy the backend first, copy its URL, then click the Render deploy button.
  - type: web
    name: rag-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        sync: false   # Enter your HF Space URL: https://Srinath-54-rag-backend.hf.space