<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060d1f"/>
      <stop offset="55%"  stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#0f2155"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="280" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="56"  x2="1280" y2="56"/>
    <line x1="0" y1="112" x2="1280" y2="112"/>
    <line x1="0" y1="168" x2="1280" y2="168"/>
    <line x1="0" y1="224" x2="1280" y2="224"/>
    <line x1="256"  y1="0" x2="256"  y2="280"/>
    <line x1="512"  y1="0" x2="512"  y2="280"/>
    <line x1="768"  y1="0" x2="768"  y2="280"/>
    <line x1="1024" y1="0" x2="1024" y2="280"/>
  </g>

  <!-- Network decoration — left cluster -->
  <g opacity="0.18">
    <line x1="72"  y1="80"  x2="72"  y2="30"  stroke="#60a5fa" stroke-width="1"/>
    <line x1="72"  y1="80"  x2="118" y2="55"  stroke="#60a5fa" stroke-width="1"/>
    <line x1="72"  y1="80"  x2="118" y2="105" stroke="#60a5fa" stroke-width="1"/>
    <line x1="72"  y1="80"  x2="72"  y2="130" stroke="#60a5fa" stroke-width="1"/>
    <line x1="72"  y1="80"  x2="26"  y2="105" stroke="#60a5fa" stroke-width="1"/>
    <line x1="72"  y1="80"  x2="26"  y2="55"  stroke="#60a5fa" stroke-width="1"/>
    <circle cx="72"  cy="30"  r="4" fill="#3b82f6"/>
    <circle cx="118" cy="55"  r="4" fill="#3b82f6"/>
    <circle cx="118" cy="105" r="4" fill="#3b82f6"/>
    <circle cx="72"  cy="130" r="4" fill="#3b82f6"/>
    <circle cx="26"  cy="105" r="4" fill="#3b82f6"/>
    <circle cx="26"  cy="55"  r="4" fill="#3b82f6"/>
    <circle cx="72"  cy="80"  r="9" fill="#1d4ed8" opacity="0.5"/>
    <circle cx="72"  cy="80"  r="6" fill="#2563eb"/>
    <circle cx="72"  cy="80"  r="3" fill="#93c5fd"/>
  </g>

  <!-- Network decoration — right cluster -->
  <g opacity="0.18">
    <line x1="1190" y1="160" x2="1190" y2="110" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1190" y1="160" x2="1236" y2="135" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1190" y1="160" x2="1236" y2="185" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1190" y1="160" x2="1190" y2="210" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1190" y1="160" x2="1144" y2="185" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1190" y1="160" x2="1144" y2="135" stroke="#60a5fa" stroke-width="1"/>
    <circle cx="1190" cy="110" r="4" fill="#3b82f6"/>
    <circle cx="1236" cy="135" r="4" fill="#3b82f6"/>
    <circle cx="1236" cy="185" r="4" fill="#3b82f6"/>
    <circle cx="1190" cy="210" r="4" fill="#3b82f6"/>
    <circle cx="1144" cy="185" r="4" fill="#3b82f6"/>
    <circle cx="1144" cy="135" r="4" fill="#3b82f6"/>
    <circle cx="1190" cy="160" r="9" fill="#1d4ed8" opacity="0.5"/>
    <circle cx="1190" cy="160" r="6" fill="#2563eb"/>
    <circle cx="1190" cy="160" r="3" fill="#93c5fd"/>
  </g>

  <!-- Connecting lines between clusters (subtle) -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="6,4">
    <line x1="118" y1="80"  x2="500"  y2="140"/>
    <line x1="118" y1="80"  x2="500"  y2="140"/>
    <line x1="1144" y1="160" x2="780" y2="140"/>
  </g>

  <!-- Glowing accent line under title area -->
  <rect x="200" y="196" width="880" height="1" fill="#3b82f6" opacity="0.25"/>

  <!-- Main title: NexusRAG -->
  <text
    x="640" y="128"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="78"
    font-weight="700"
    letter-spacing="3"
    text-anchor="middle"
    fill="url(#titleGrad)"
  >NexusRAG</text>

  <!-- Tagline -->
  <text
    x="640" y="172"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="1.5"
    text-anchor="middle"
    fill="#60a5fa"
    opacity="0.9"
  >Private knowledge. Enterprise intelligence. Zero cost.</text>

  <!-- Stat pills row -->
  <!-- Pill 1: Factual -->
  <g transform="translate(288, 210)">
    <rect x="0" y="0" width="158" height="34" rx="17" fill="#1e3a6e" opacity="0.8"/>
    <rect x="0" y="0" width="158" height="34" rx="17" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
    <circle cx="22" cy="17" r="7" fill="#22c55e" opacity="0.9"/>
    <text x="37" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#f0f9ff">Factual: 100%</text>
  </g>
  <!-- Pill 2: Hallucination -->
  <g transform="translate(462, 210)">
    <rect x="0" y="0" width="216" height="34" rx="17" fill="#1e3a6e" opacity="0.8"/>
    <rect x="0" y="0" width="216" height="34" rx="17" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
    <circle cx="22" cy="17" r="7" fill="#22c55e" opacity="0.9"/>
    <text x="37" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#f0f9ff">Hallucination Resistance: 100%</text>
  </g>
  <!-- Pill 3: Cost -->
  <g transform="translate(694, 210)">
    <rect x="0" y="0" width="140" height="34" rx="17" fill="#1e3a6e" opacity="0.8"/>
    <rect x="0" y="0" width="140" height="34" rx="17" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
    <circle cx="22" cy="17" r="7" fill="#f59e0b" opacity="0.9"/>
    <text x="37" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#f0f9ff">$0 Infrastructure</text>
  </g>
  <!-- Pill 4: Open Source -->
  <g transform="translate(850, 210)">
    <rect x="0" y="0" width="140" height="34" rx="17" fill="#1e3a6e" opacity="0.8"/>
    <rect x="0" y="0" width="140" height="34" rx="17" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
    <circle cx="22" cy="17" r="7" fill="#a78bfa" opacity="0.9"/>
    <text x="37" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#f0f9ff">Apache 2.0</text>
  </g>
</svg>
